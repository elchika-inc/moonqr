name: CI

# push/PR ごとに MoonBit コア + TS パッケージ両方のテストを走らせる。
# pages.yml（Task 7）と同じ MoonBit/pnpm セットアップ手順を踏襲する。
on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # MoonBit の CDN (cli.moonbitlang.com) は "latest"/"nightly" チャンネルしか配信せず、
      # 日付/バージョン指定の過去ビルドを保持していない（unix.sh の ARGUMENTS /
      # MOONBIT_INSTALL_VERSION は latest/nightly の切り替えにしか使えず、過去の日付付き
      # バージョンを指定しても 403 になる。2026-07-14 に確認済み）。文字列によるバージョン
      # 固定は上流の都合で不可能——このキャッシュはそれの代替ではなく、単なるダウンロード
      # 時間短縮のためのビルド高速化キャッシュ。キーには実際に検証済みの moon バージョンを
      # 含めており、latest が進んでも自動では変わらない（＝黙って知らぬ間に壊れることはない）。
      # 新しい latest でコードを検証・移行したら、その時点でキーをそのバージョンに手動で
      # 更新する（cache-miss→フレッシュインストールが起きるのは意図通り）。latest が既存
      # コードを壊した場合の対応は「コードを latest に追従させる」（pre-1.0 言語のトレード
      # オフ。詳細・アップグレード手順は docs/TOOLCHAIN.md）。
      - name: Cache MoonBit toolchain
        id: moon-cache
        uses: actions/cache@v4
        with:
          path: ~/.moon
          key: moonbit-toolchain-${{ runner.os }}-0.1.20260713

      - name: Install MoonBit toolchain
        if: steps.moon-cache.outputs.cache-hit != 'true'
        run: curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash

      - name: Add MoonBit to PATH
        run: echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Show MoonBit toolchain version
        run: moon version

      - name: moon test (core, target js)
        working-directory: core
        run: moon test --target js

      - name: moon build (core, target js, release)
        working-directory: core
        run: moon build --target js --release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Enable pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (tsup)
        run: pnpm -r build

      - name: Typecheck packages
        run: pnpm -r typecheck

      # fixtures/jsqr-e2e/ は jsQR の pinned SHA を shallow clone して取得する
      # （scripts/fetch-fixtures.mjs）。gitignore 対象・ネットワークが要るため、
      # SHA（＝スクリプトの内容）が変わらない限り再取得しないようキャッシュする。
      - name: Cache jsQR e2e fixtures
        id: fixtures-cache
        uses: actions/cache@v4
        with:
          path: fixtures/jsqr-e2e
          key: fixtures-jsqr-e2e-${{ hashFiles('scripts/fetch-fixtures.mjs') }}

      - name: Fetch jsQR e2e fixtures (parity test corpus)
        run: node scripts/fetch-fixtures.mjs

      - name: Node test suite (moonqr, incl. jsQR parity + encode sweep)
        run: node --test packages/moonqr/test/*.test.mjs

      - name: Vitest (moonqr)
        run: pnpm --filter @elchika-inc/moonqr test:unit

      - name: Vitest (scanner)
        run: pnpm --filter @elchika-inc/moonqr-scanner test:unit

      - name: Report bundle sizes
        if: always()
        run: node scripts/report-bundle-sizes.mjs
