name: Deploy demo to GitHub Pages

# site/ (see scripts/build-site.mjs) を GitHub Pages に公開する。docs/ には
# .superpowers 由来の内部設計ドキュメントが置かれているため、Pages の `/docs`
# 標準ディレクトリではなく Pages-from-Actions（upload-pages-artifact）で
# site/ だけを公開対象にする（Task 7 レイアウト決定）。
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Build core (MoonBit -> JS)
        working-directory: core
        run: moon build --target js --release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Enable pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (@elchika-inc/moonqr, @elchika-inc/moonqr-scanner)
        run: pnpm -r build

      - name: Assemble site (copy dist into site/assets/)
        run: pnpm run build:site

      # Pages-from-Actions の標準手順。リポジトリ Settings の Pages source が
      # 「GitHub Actions」であることを前提に、デプロイに必要なメタデータを整える
      # （初回の source 設定自体は Task 10 の human-gate で一度だけ手動で行う）。
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
