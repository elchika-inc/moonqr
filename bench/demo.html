<!doctype html>
<meta charset="utf-8">
<title>moonqr demo</title>
<style>
  body { font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 24px; padding: 20px; }
  figure { margin: 0; text-align: center; }
  svg { width: 240px; height: 240px; }
  figcaption { max-width: 240px; word-break: break-all; font-size: 12px; }
  #decoder-section { width: 100%; margin-bottom: 20px; }
  #drop-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: background 0.2s; }
  #drop-zone.dragover { background: #f0f0f0; border-color: #999; }
  .result { margin: 10px 0; padding: 10px; border: 1px solid #ddd; border-radius: 4px; text-align: left; }
  .result-thumbnail { max-width: 160px; max-height: 160px; margin: 10px 0; }
  .result-success { color: #2ecc71; font-weight: bold; }
  .result-failure { color: #e74c3c; font-weight: bold; }
</style>
<body>
<div id="decoder-section">
  <h2>QRコード読取（画像ファイル）</h2>
  <div id="drop-zone">
    <p>ここにQR画像をドラッグ&ドロップ、またはクリックして選択</p>
    <input type="file" id="file-input" accept="image/*" multiple style="display: none;">
  </div>
  <div id="results"></div>
</div>

<script type="module">
  // Decode セクション
  const decode_mod = await import("../core/_build/js/release/build/decode/decode.js");
  const decode_js = decode_mod.decode_js;

  const fileInput = document.getElementById("file-input");
  const dropZone = document.getElementById("drop-zone");
  const resultsDiv = document.getElementById("results");

  dropZone.addEventListener("click", () => fileInput.click());

  dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
  });

  dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
  });

  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    fileInput.files = e.dataTransfer.files;
    handleFiles(e.dataTransfer.files);
  });

  fileInput.addEventListener("change", (e) => {
    handleFiles(e.target.files);
  });

  async function handleFiles(files) {
    resultsDiv.innerHTML = "";
    for (const file of files) {
      const result = await processImage(file);
      resultsDiv.appendChild(result);
    }
  }

  // --- マルチスケールデコード（Phase 2 Task 12: モニター格子写真対応） ---
  //
  // root cause: モニター表示のQRをスマホで撮影すると、モニターのサブピクセル
  // 格子（白いはずの領域に写り込む高周波の暗い格子線）が乗る。jsQR方式の
  // ブロック二値化はこれを「ほぼ50%speckle」と誤認しファインダを検出できなく
  // なる（jsQR npmでも同一の失敗＝コアの二値化/ロケータは無改修）。素朴な
  // 単発縮小（旧実装のdrawImageによる単一downscale）はこの格子をエイリアシング
  // してむしろ悪化させる。2x2ボックス平均による段階的な半分縮小（正しい
  // ローパスフィルタ）を繰り返すと1/8スケール付近で解決する。詳細は
  // bench/RESULT.md Task 12 節を参照。
  //
  // 同一ロジックの正本は packages/scanner/src/multiscale.ts（Phase 3 Task 5 で
  // 一本化。旧 packages/moonqr/test/lib/multiscale.mjs の手動同期複製は削除済み）。
  // demo.html は bench/ から静的配信される単体HTMLのため packages/ 配下から
  // importできず、このインライン複製が暫定的に残っている——Task 7 で
  // demo.html を scanner/moonqr の dist import に作り直す際に削除される
  // （意図的な二段階移行。ロジックを変更する場合は multiscale.ts と両方
  // 更新すること）。

  // decode_js (core/src/decode/decode.mbt) の max_pixels 定数と同じ値
  // （16 * 1024 * 1024 = 16,777,216）。
  const MAX_PIXELS = 16 * 1024 * 1024;

  // RGBA画素配列を2x2ボックス平均で縦横半分に縮小する（決定的・純JS実装）。
  function halveRGBA(data, width, height) {
    const nw = Math.floor(width / 2);
    const nh = Math.floor(height / 2);
    const out = new Uint8Array(nw * nh * 4);
    for (let y = 0; y < nh; y++) {
      for (let x = 0; x < nw; x++) {
        const sx = x * 2;
        const sy = y * 2;
        let r = 0, g = 0, b = 0, a = 0;
        for (let dy = 0; dy < 2; dy++) {
          for (let dx = 0; dx < 2; dx++) {
            const si = ((sy + dy) * width + (sx + dx)) * 4;
            r += data[si];
            g += data[si + 1];
            b += data[si + 2];
            a += data[si + 3];
          }
        }
        const di = (y * nw + x) * 4;
        out[di] = r >> 2;
        out[di + 1] = g >> 2;
        out[di + 2] = b >> 2;
        out[di + 3] = a >> 2;
      }
    }
    return { data: out, width: nw, height: nh };
  }

  // 半減ピラミッドを構築し、小スケール（画素数の少ない）レベルから昇順に
  // decodeFn を試行する。成功時は { result, scale, width, height,
  // attemptedScales } を返す（scale = 1/scale が入力ネイティブ解像度に対する
  // 総縮小率。メモリガードの事前半減も計上する。attemptedScales = 試行順の
  // scale 列、先頭が最小レベル）。全レベル失敗なら null。
  //
  // 試行順の根拠（perf）: カメラ写真は小スケールでデコードできることが大半
  // （実測: ユーザーの16Mピクセル写真は1/8スケールでのみ成功）なのに、大スケール
  // から試すとネイティブ解像度の失敗試行（スマホ実機で数秒）を毎回払う。安価な
  // 小スケール（~100ms）から試し、フル解像度は「遠く/小さく写ったQR」向けの
  // 最後の手段とする。メモリ注記: ピラミッド全レベルの保持コストは幾何級数
  // （1 + 1/4 + 1/16 + ...）で基点画像の約1.33倍——許容範囲として先行構築を採用。
  function multiScaleDecode(decodeFn, data, width, height) {
    let curData = data, curW = width, curH = height;
    let scale = 1; // 入力ネイティブ解像度に対する総縮小率（事前半減も計上する）

    // メモリガード: 16Mピクセル上限に収まるまで先に縮小。この半減も scale に
    // 計上する——計上しないと「事前半減のおかげで初めて成功した」ケースが
    // scale=1（無縮小成功）として報告されてしまう（48MP級スマホ写真で日常的に発動）。
    while (curW * curH > MAX_PIXELS) {
      const halved = halveRGBA(curData, curW, curH);
      curData = halved.data; curW = halved.width; curH = halved.height;
      scale *= 2;
    }

    // 半減ピラミッド構築（levels[0] = 基点 = 最大レベル）
    const levels = [{ data: curData, width: curW, height: curH, scale }];
    while (Math.max(curW, curH) >= 150) {
      const halved = halveRGBA(curData, curW, curH);
      curData = halved.data; curW = halved.width; curH = halved.height;
      scale *= 2;
      levels.push({ data: curData, width: curW, height: curH, scale });
    }

    // 小スケール（画素数の少ない）レベルから昇順に試行
    const attemptedScales = [];
    for (let i = levels.length - 1; i >= 0; i--) {
      const lv = levels[i];
      attemptedScales.push(lv.scale);
      const result = decodeFn(lv.data, lv.width, lv.height);
      if (result) {
        return { result, scale: lv.scale, width: lv.width, height: lv.height, attemptedScales };
      }
    }
    return null;
  }

  async function processImage(file) {
    const resultDiv = document.createElement("div");
    resultDiv.className = "result";

    try {
      const bitmap = await createImageBitmap(file);
      const { width, height } = bitmap;

      // ネイティブ解像度でImageDataを取得する（旧実装の「1600px超なら
      // drawImageで単発縮小してからdecode」はモニター格子をエイリアシング
      // して悪化させるため廃止。縮小は multiScaleDecode 内の2x2ボックス
      // 平均に一本化する）。
      const canvas = new OffscreenCanvas(width, height);
      const ctx = canvas.getContext("2d");
      ctx.drawImage(bitmap, 0, 0, width, height);
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = new Uint8Array(imageData.data.buffer, imageData.data.byteOffset, imageData.data.byteLength);

      const decodeFn = (d, w, h) => {
        const out = decode_js(d, w, h, true);
        return out === "" ? null : JSON.parse(out);
      };
      const outcome = multiScaleDecode(decodeFn, data, width, height);
      const resultObj = outcome ? outcome.result : null;

      // Create thumbnail
      const thumbCanvas = new OffscreenCanvas(160, 160);
      const thumbCtx = thumbCanvas.getContext("2d");
      thumbCtx.fillStyle = "#fff";
      thumbCtx.fillRect(0, 0, 160, 160);
      const thumbScale = Math.min(160 / width, 160 / height);
      const x = (160 - width * thumbScale) / 2;
      const y = (160 - height * thumbScale) / 2;
      thumbCtx.drawImage(bitmap, x, y, width * thumbScale, height * thumbScale);

      const thumbBlob = await thumbCanvas.convertToBlob();
      const thumbUrl = URL.createObjectURL(thumbBlob);

      resultDiv.innerHTML = `
        <strong>${file.name}</strong>
        <img src="${thumbUrl}" class="result-thumbnail" alt="thumbnail">
      `;

      if (resultObj) {
        const text = resultObj.text || "(empty)";
        const version = resultObj.version !== undefined ? resultObj.version : "?";
        const ecLevel = resultObj.ecLevel || "?";
        const scaleNote = outcome.scale > 1 ? `（1/${outcome.scale}スケール）` : "";
        const attemptsNote = outcome.attemptedScales
          .map((s) => (s > 1 ? `1/${s}` : "1/1"))
          .join(" → ");
        resultDiv.innerHTML += `
          <p class="result-success">✓ 読取成功${scaleNote}</p>
          <p>テキスト: <code>${escapeHtml(text)}</code></p>
          <p>バージョン: ${version} / エラー訂正レベル: ${ecLevel}</p>
          <p style="font-size: 11px; color: #888;">試行スケール（小→大）: ${attemptsNote}</p>
        `;
      } else {
        resultDiv.innerHTML += `<p class="result-failure">✗ 読取失敗</p>`;
      }
    } catch (err) {
      resultDiv.innerHTML = `
        <strong>${file.name}</strong>
        <p class="result-failure">✗ エラー: ${escapeHtml(err.message)}</p>
      `;
    }

    return resultDiv;
  }

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }
</script>

<script type="module">
  // Encode セクション（元のコード）
  const mod = await import("../core/_build/js/release/build/encode/encode.js");
  const EC = { L: 0, M: 1, Q: 2, H: 3 };
  const CASES = [
    ["HELLO", "M"],
    ["https://github.com/naoto24kawa/moonqr", "M"],
    ["0123456789", "L"],
    ["こんにちは世界🦑", "H"],
    ["A".repeat(500), "Q"],
    ["WIFI:T:WPA;S:test;P:pass1234;;", "M"],
  ];
  for (const [text, ec] of CASES) {
    const flat = mod.encode_js(text, EC[ec], 0);
    const size = flat[0];
    const margin = 4;
    const total = size + margin * 2;
    let d = "";
    for (let y = 0; y < size; y++) for (let x = 0; x < size; x++) {
      if (flat[1 + y * size + x]) d += `M${x + margin} ${y + margin}h1v1h-1z`;
    }
    const fig = document.createElement("figure");
    fig.innerHTML =
      `<svg viewBox="0 0 ${total} ${total}">` +
      `<rect width="${total}" height="${total}" fill="#fff"/>` +
      `<path d="${d}" fill="#000"/></svg>` +
      `<figcaption>[${ec}] ${text.slice(0, 60)}</figcaption>`;
    document.body.appendChild(fig);
  }
</script>
</body>
